name: Release with GoReleaser

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # First job to run unit tests
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Run unit tests
        run: go test -p 1 $(go list ./... | grep -v /test/) -v

  # Integration tests job
  integration-test:
    name: Run Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name postgres \
            -p 5432:5432 \
            -e POSTGRES_USER=an \
            -e POSTGRES_PASSWORD=an \
            -e POSTGRES_DB=an \
            postgres:17

          # Wait for PostgreSQL to be ready
          timeout 30 bash -c 'until docker exec postgres pg_isready -U an -d an > /dev/null 2>&1; do sleep 1; done'

      - name: Build an
        run: go build -o an ./cmd/an

      - name: Start an service
        run: |
          ./an &
          echo $! > an.pid

          # Wait for service to be ready
          timeout 30 bash -c 'until curl -f http://localhost:8080/health > /dev/null 2>&1; do sleep 1; done'
        env:
          DB_CONNECTION: postgres://an:an@localhost:5432/an?sslmode=disable
          PORT: 8080
          BOOTSTRAP_API_KEY: ci-bootstrap-key
          CORS_ENABLED: false
          REQUESTS_PER_SECOND: 1000

      - name: Run integration tests
        run: go test -v ./...
        working-directory: test
        env:
          API_KEY: ci-bootstrap-key

      - name: Stop an service
        if: always()
        run: |
          if [ -f an.pid ]; then
            kill $(cat an.pid) || true
          fi

      - name: Cleanup containers
        if: always()
        run: |
          docker stop postgres || true
          docker rm postgres || true

  # Second job to determine the next version
  semver:
    name: Calculate Semantic Version
    needs: [test, integration-test]
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semantic-version.outputs.version }}
      new_tag: ${{ steps.semantic-version.outputs.version_tag }}
      should_release: ${{ steps.release-check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic versioning
        id: semantic-version
        uses: PaulHatch/semantic-version@v5.3.0
        with:
          tag_prefix: "v"
          major_pattern: "BREAKING CHANGE:"
          minor_pattern: "feat:"
          patch_pattern: "fix:"
          format: "${major}.${minor}.${patch}"
          bump_each_commit: false
          search_commit_body: true

      - name: Check if this is a release
        id: release-check
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" && "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Debug version info
        run: |
          echo "New version: ${{ steps.semantic-version.outputs.version }}"
          echo "New tag: v${{ steps.semantic-version.outputs.version }}"
          echo "Should release: ${{ steps.release-check.outputs.should_release }}"

  create-tag:
    name: Create Git Tag
    needs: semver
    if: needs.semver.outputs.should_release == 'true' && github.ref_type != 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write # For creating the release tag
    outputs:
      tag_name: ${{ steps.tag-info.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create GitHub tag
        id: create-tag
        uses: actions/github-script@v8
        with:
          script: |
            const tagName = 'v${{ needs.semver.outputs.new_version }}';
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tagName}`,
                sha: context.sha
              });
              console.log(`Created tag: ${tagName}`);
              return tagName;
            } catch (error) {
              console.log(`Failed to create tag: ${error.message}`);
              return '';
            }

      - name: Set tag info
        id: tag-info
        run: |
          echo "tag_name=v${{ needs.semver.outputs.new_version }}" >> $GITHUB_OUTPUT

  # Final job to build and publish with GoReleaser
  release:
    name: Release with GoReleaser
    needs: [semver, create-tag]
    if: needs.semver.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # For creating releases
      packages: write # For pushing to GitHub Container Registry
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release tag
        if: github.ref_type != 'tag'
        run: |
          echo "RELEASE_TAG=v${{ needs.semver.outputs.new_version }}" >> $GITHUB_ENV

      - name: Use existing tag
        if: github.ref_type == 'tag'
        run: |
          echo "RELEASE_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Run GoReleaser (release)
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ env.RELEASE_TAG }}
